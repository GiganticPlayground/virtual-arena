<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Arena Prototype</title>
<!--
  Virtual Arena Prototype
  =======================
  Real-time virtual background using MediaPipe ImageSegmenter
  (selfie_multiclass_256x256) with WebGL2 compositing.

  File layout:
    index.html                 scaffolding + control markup
    styles.css                 all styling
    src/main.js                app entry; imports the rest
    src/{config,dom,shaders,renderer,
         worker-client,source,foam,
         backgrounds,preload}.js
    src/worker.js              inference worker (MediaPipe lives here)

  Run (from the prototype/ folder, one level up):
    npm install && npm start
  Then open http://localhost:8123 in Chrome desktop.

  Deployment: push to GitHub and set Pages to serve from "main / docs".
-->
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="preload">
    <div class="title">Preparing Virtual Arena</div>
    <div class="sub" id="progressSub">Initializing…</div>
    <div class="bar-wrap"><div class="bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">0.0 / 0.0 MB</div>
    <div class="cta" id="progressCta"></div>
  </div>
  <div id="stage">
    <canvas id="gl" width="1280" height="720"></canvas>
    <video id="video" autoplay playsinline muted></video>
  </div>
  <div id="foam-layer"></div>
  <div id="hud">
    <div id="fps">Render&nbsp;&nbsp;&nbsp;—</div>
    <div id="inf">Infer&nbsp;&nbsp;&nbsp;&nbsp;—</div>
  </div>
  <div id="status"></div>
  <div id="controls">
    <div class="group">
      <button id="toggle" disabled>Start</button>
      <label>
        Source Video
        <select id="source">
          <option value="webcam">Webcam</option>
          <option value="./input_videos/1.mp4">Video 1</option>
          <option value="./input_videos/2.mp4">Video 2</option>
          <option value="./input_videos/3.mp4">Video 3</option>
          <option value="./input_videos/4.mp4">Video 4</option>
          <option value="./input_videos/5.mp4">Video 5</option>
        </select>
        <span class="help" data-tip="Choose the live webcam feed or one of the bundled sample videos as the input.">?</span>
      </label>
      <label class="upload-btn">
        Upload Video
        <input id="uploadVideo" type="file" accept="video/*" hidden>
        <span class="help" data-tip="Upload your own video file to use as the input instead of the webcam or bundled videos.">?</span>
      </label>
      <label>
        Source Size
        <input id="camSize" type="range" min="0.1" max="2" step="0.05" value="1">
        <span id="camSizeVal">1.00</span>
        <span class="help" data-tip="Scale of the source (person) inside the canvas. 1.0 = native, higher = zoomed in.">?</span>
      </label>
      <label>
        Source X
        <input id="camX" type="range" min="-1" max="1" step="0.02" value="0">
        <span id="camXVal">0.00</span>
        <span class="help" data-tip="Horizontal position of the source. −1 = left edge, 0 = center, +1 = right edge.">?</span>
      </label>
      <label>
        Source Y
        <input id="camY" type="range" min="-1" max="1" step="0.02" value="0">
        <span id="camYVal">0.00</span>
        <span class="help" data-tip="Vertical position of the source. −1 = bottom, 0 = center, +1 = top.">?</span>
      </label>
    </div>
    <span class="divider"></span>
    <div class="group">
      <label>
        Background
        <select id="arena"></select>
        <span class="help" data-tip="Pick a preloaded arena background to composite behind the subject.">?</span>
      </label>
      <label class="upload-btn">
        Upload Background
        <input id="upload" type="file" accept="image/*" hidden>
        <span class="help" data-tip="Upload your own background image instead of using a preloaded arena.">?</span>
      </label>
      <label>
        Segmenter Model
        <select id="model">
          <option value="binary">Silhouette (MediaPipe, fast)</option>
          <option value="multiclass">Multiclass (MediaPipe)</option>
          <option value="rvm">RVM (ONNX, single-subject)</option>
          <option value="u2netp">U²-Net-p (ONNX, 4 MB, interactive)</option>
          <option value="modnet">MODNet (ONNX, 26 MB, interactive matting)</option>
          <option value="silueta">Silueta (ONNX, 42 MB, ~0.2 FPS — quality reference)</option>
        </select>
        <span class="help" data-tip="Silhouette / Multiclass: MediaPipe (fast, multi-person). U²-Net-p: ONNX on WebGPU, interactive single-subject matting. RVM: ONNX on WASM, recurrent single-subject matting. Silueta: ONNX, best quality but falls back to CPU (~0.2 FPS) — quality reference, not interactive. First-time selection downloads the ONNX model.">?</span>
      </label>
      <label>
        RVM Quality
        <select id="rvmQuality">
          <option value="quality">Quality (512×288)</option>
          <option value="balanced">Balanced (384×224)</option>
          <option value="fast">Fast (256×160)</option>
        </select>
        <span class="help" data-tip="RVM input resolution. Smaller = faster but coarser matte. Only RVM supports variable input; U²-Net-p and Silueta ship as fixed-shape 320×320 ONNX so this is disabled for them.">?</span>
      </label>
      <label>
        Edge Feather
        <input id="feather" type="range" min="0" max="5" step="0.1" value="1.5">
        <span id="featherVal">1.5</span>
        <span class="help" data-tip="Softness of the mask edge, in pixels. Higher values blur the cutout border for a smoother blend with the background.">?</span>
      </label>
      <label>
        Edge Trim
        <input id="trim" type="range" min="-0.3" max="0.3" step="0.02" value="0">
        <span id="trimVal">0.00</span>
        <span class="help" data-tip="Positive values tighten the mask (peels off chair backs and edge bleed); negative values expand it (catches more hair).">?</span>
      </label>
    </div>
    <span class="divider"></span>
    <div class="group">
      <label>
        <input id="mirror" type="checkbox" checked>
        Mirror
        <span class="help" data-tip="Flip the source horizontally. Useful for webcam input so your movements match a mirror.">?</span>
      </label>
      <label>
        <input id="foam" type="checkbox">
        Foam Finger
        <span class="help" data-tip="Overlay animated foam fingers on detected hands. Uses MediaPipe hand landmarker — adds inference cost.">?</span>
      </label>
      <label>
        Hands
        <select id="handCount">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
        <span class="help" data-tip="Maximum hands MediaPipe will track. Higher = more people can wave foam fingers, but each hand costs inference time. Default is 2 (one person's hands).">?</span>
      </label>
      <label>
        Inference Rate
        <input id="infRate" type="range" min="5" max="120" step="5" value="30">
        <span id="infRateVal">30</span>&nbsp;Hz
        <span class="help" data-tip="How often segmentation + hand tracking run per second. Lower = more headroom for other work, higher = less mask lag behind motion.">?</span>
      </label>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
