<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Arena Prototype</title>
<!--
  Virtual Arena Prototype
  =======================
  Real-time virtual background using MediaPipe ImageSegmenter
  (selfie_multiclass_256x256) with WebGL2 compositing.

  File layout:
    index.html                 scaffolding + control markup
    styles.css                 all styling
    src/main.js                app entry; imports the rest
    src/{config,dom,shaders,renderer,
         worker-client,source,foam,
         backgrounds,preload}.js
    src/worker.js              inference worker (MediaPipe lives here)

  Run (from the prototype/ folder, one level up):
    npm install && npm start
  Then open http://localhost:8123 in Chrome desktop.

  Deployment: push to GitHub and set Pages to serve from "main / docs".
-->
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="preload">
    <div class="title">Preparing Virtual Arena</div>
    <div class="sub" id="progressSub">Initializing…</div>
    <div class="bar-wrap"><div class="bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">0.0 / 0.0 MB</div>
    <div class="cta" id="progressCta"></div>
  </div>
  <div id="stage">
    <canvas id="gl" width="1280" height="720"></canvas>
    <video id="video" autoplay playsinline muted></video>
  </div>
  <div id="foam-layer"></div>
  <div id="hud">
    <div id="fps">Render&nbsp;&nbsp;&nbsp;—</div>
    <div id="inf">Infer&nbsp;&nbsp;&nbsp;&nbsp;—</div>
  </div>
  <div id="status"></div>
  <div id="controls">
    <div class="group">
      <button id="toggle" disabled>Start</button>
      <label>
        Source
        <select id="source">
          <option value="webcam">Webcam</option>
          <option value="./input_videos/1.mp4">Video 1</option>
          <option value="./input_videos/2.mp4">Video 2</option>
          <option value="./input_videos/3.mp4">Video 3</option>
        </select>
      </label>
      <label class="upload-btn" title="Upload your own video file to use as the input">
        Upload Video
        <input id="uploadVideo" type="file" accept="video/*" hidden>
      </label>
      <label title="Scale of the source inside the canvas">
        Size
        <input id="camSize" type="range" min="0.1" max="2" step="0.05" value="1">
        <span id="camSizeVal">1.00</span>
      </label>
      <label title="Horizontal position (-1 = left edge, 0 = center, +1 = right edge)">
        X
        <input id="camX" type="range" min="-1" max="1" step="0.02" value="0">
        <span id="camXVal">0.00</span>
      </label>
      <label title="Vertical position (-1 = bottom, 0 = center, +1 = top)">
        Y
        <input id="camY" type="range" min="-1" max="1" step="0.02" value="0">
        <span id="camYVal">0.00</span>
      </label>
    </div>
    <span class="divider"></span>
    <div class="group">
      <label>
        Background
        <select id="arena"></select>
      </label>
      <label class="upload-btn" title="Upload your own background image">
        Upload
        <input id="upload" type="file" accept="image/*" hidden>
      </label>
      <label title="Segmenter model. Silhouette is a binary person/background model and usually stays off chairs and props. Multiclass predicts person-parts and is more inclusive but drags in objects touching people.">
        Model
        <select id="model">
          <option value="binary">Silhouette</option>
          <option value="multiclass">Multiclass</option>
        </select>
      </label>
      <label>
        Feather
        <input id="feather" type="range" min="0" max="5" step="0.1" value="1.5">
        <span id="featherVal">1.5</span>
      </label>
      <label title="Silhouette trim. Positive tightens the mask (peels off chair backs and edge bleed); negative expands it (catches more hair).">
        Trim
        <input id="trim" type="range" min="-0.3" max="0.3" step="0.02" value="0">
        <span id="trimVal">0.00</span>
      </label>
    </div>
    <span class="divider"></span>
    <div class="group">
      <label>
        <input id="mirror" type="checkbox" checked>
        Mirror
      </label>
      <label>
        <input id="foam" type="checkbox">
        Foam Finger
      </label>
      <label title="Rate at which segmentation + hand tracking run. Lower = more headroom, higher = less mask lag.">
        Inference
        <input id="infRate" type="range" min="5" max="60" step="5" value="30">
        <span id="infRateVal">30</span>&nbsp;Hz
      </label>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
